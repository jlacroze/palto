<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- 🔥 TITLE -->
    <title>Palto - Agence de stratégie digitale & performance</title>

    <!-- 🔥 DESCRIPTION -->
    <meta
      name="description"
      content="Palto accompagne les entreprises dans leur stratégie digitale, leur croissance et leur performance avec une approche sur-mesure."
    />

    <!-- MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />

    <!-- 🔥 PRECONNECT (PERF FONTS si Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- 👉 Exemple Google Fonts (à adapter si tu en utilises) -->
    <!-- IMPORTANT : display=swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- 🔥 OPEN GRAPH -->
    <meta property="og:title" content="Palto - Stratégie & Excellence" />
    <meta
      property="og:description"
      content="Agence spécialisée en stratégie digitale et performance."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://palto-ten.vercel.app/" />
    <meta property="og:image" content="/preview.jpg" />

    <!-- 🔥 TWITTER -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Palto - Stratégie & Excellence" />
    <meta
      name="twitter:description"
      content="Agence spécialisée en stratégie digitale."
    />
    <meta name="twitter:image" content="/preview.jpg" />

    <!-- 🔥 LCP BOOST (CRITIQUE) -->
    <!-- ⚠️ mets le BON format (webp ou avif) -->
    <link rel="preload" as="image" href="/bg_hero.jpg" fetchpriority="high" />

    <!-- 🔥 DNS PREFETCH (optionnel mais propre) -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />

    <!-- favicon -->
    <link rel="icon" href="/favicon.svg" />

    <!-- 🔥 CRITICAL CSS (mini reset rapide) -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- 🔥 JS -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
